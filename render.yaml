services:
  - type: web
    name: breathe-esg-api
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
    autoDeploy: true

  - type: web
    name: breathe-esg-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://breathe-esg-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
